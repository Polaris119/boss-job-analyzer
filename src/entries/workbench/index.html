<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BOSS直聘岗位分析助手 - 工作台</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="workbench-header">
      <div>
        <p>BOSS直聘岗位分析助手</p>
        <h1>岗位分析工作台</h1>
        <span>历史记录、并行队列与失败重试</span>
      </div>
      <div class="runner-controls">
        <button id="toggle-queue" type="button">暂停启动新任务</button>
        <button id="clear-history" class="clear-history-button" type="button">清空历史记录</button>
      </div>
    </header>

    <main class="workbench-shell">
      <section class="keep-open-note">
        <strong>工作台可以随时关闭</strong>
        <span>岗位分析由扩展后台执行；关闭此页面不会中断任务，浏览器意外中止时会从最近完成阶段恢复。</span>
      </section>

      <section class="stats-grid">
        <article><span>全部</span><strong id="stat-total">0</strong></article>
        <article><span>等待</span><strong id="stat-queued">0</strong></article>
        <article><span>分析中</span><strong id="stat-running">0</strong></article>
        <article><span>已完成</span><strong id="stat-completed">0</strong></article>
        <article><span>失败</span><strong id="stat-failed">0</strong></article>
      </section>

      <section class="task-panel">
        <div class="panel-head">
          <div><h2>公司与岗位任务</h2><p id="runner-status">队列正在运行</p></div>
          <div class="filters" role="group" aria-label="任务筛选">
            <button class="filter active" data-filter="all" type="button">全部</button>
            <button class="filter" data-filter="active" type="button">进行中</button>
            <button class="filter" data-filter="completed" type="button">已完成</button>
            <button class="filter" data-filter="failed" type="button">失败</button>
          </div>
        </div>
        <div class="batch-toolbar">
          <label class="select-all-option" for="select-all">
            <input id="select-all" type="checkbox">
            <span>选择当前列表</span>
          </label>
          <span id="batch-summary">未选择历史任务</span>
          <div class="batch-actions">
            <button id="batch-reanalyze" type="button" disabled>批量重新分析</button>
            <button id="batch-delete" class="danger" type="button" disabled>批量删除</button>
          </div>
        </div>
        <div id="task-list" class="task-list"></div>
        <div id="empty" class="empty" hidden>还没有岗位任务。请在 BOSS 岗位详情页点击“AI 分析当前岗位”，然后加入队列。</div>
      </section>
    </main>
    <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
    <script src="../../features/job-capture/salary-parser.js"></script>
    <script type="module" src="controller.mjs"></script>
  </body>
</html>
