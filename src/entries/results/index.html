<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BOSS直聘岗位分析助手 - 分析结果</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="result-header">
      <div>
        <h1 id="job-title">岗位分析结果</h1>
        <span id="job-meta"></span>
      </div>
      <a class="back-workbench-button" href="../workbench/index.html">← 返回岗位工作台</a>
    </header>

    <main class="result-shell">
      <nav class="top-tabs" aria-label="结果类型">
        <button class="top-tab active" data-tab="report" type="button">岗位准备分析</button>
        <button class="top-tab" data-tab="resume" type="button">定制简历</button>
      </nav>

      <section id="report-panel" class="panel">
        <div class="panel-toolbar">
          <h2>岗位准备分析</h2>
          <button id="download-markdown" class="primary-button" type="button">下载 Markdown 报告</button>
        </div>

        <div class="report-layout">
          <aside class="report-sidebar">
            <p>求职判断</p>
            <nav id="report-nav" class="report-nav" aria-label="报告内容导航">
              <a href="#overview-section" data-target="overview-section" aria-current="true">是否适合投</a>
              <a href="#strengths-section" data-target="strengths-section">我有什么优势</a>
              <a href="#gaps-section" data-target="gaps-section">还需要补什么</a>
              <a href="#actions-section" data-target="actions-section">现在该做什么</a>
              <a href="#knowledge-section" data-target="knowledge-section">需要学什么</a>
              <a href="#short-term-section" data-target="short-term-section">近期准备</a>
              <a href="#long-term-section" data-target="long-term-section">长期提升</a>
              <a href="#interview-section" data-target="interview-section">面试准备</a>
            </nav>
          </aside>

          <div class="report-content">
            <section id="overview-section" class="content-card overview-card" data-report-section></section>
            <section id="strengths-section" class="content-card" data-report-section></section>
            <section id="gaps-section" class="content-card" data-report-section></section>
            <section id="actions-section" class="content-card" data-report-section></section>
            <section id="knowledge-section" class="content-card" data-report-section></section>
            <section id="short-term-section" class="content-card" data-report-section></section>
            <section id="long-term-section" class="content-card" data-report-section></section>
            <section id="interview-section" class="content-card" data-report-section></section>
          </div>
        </div>
      </section>

      <section id="resume-panel" class="panel" hidden>
        <div class="panel-toolbar">
          <div><h2>定制简历</h2><p>经典蓝色单栏 · A4 自动分页</p></div>
          <div class="toolbar-actions">
            <label class="theme-control">分隔线颜色 <input id="resume-theme-color" type="color" value="#24548f"></label>
            <button id="add-resume-section" class="secondary-button" type="button">新增区块</button>
            <button id="save-result" class="secondary-button" type="button">保存修改</button>
            <button id="export-pdf" class="primary-button" type="button">预览并导出 PDF</button>
          </div>
        </div>
        <div class="resume-template-settings">
          <div class="template-summary">
            <span class="template-swatch" aria-hidden="true"></span>
            <span><strong>经典蓝色单栏</strong><small>经历分列展示，奖项按内容与时间对齐；内容过长时自动分页。</small></span>
          </div>
          <section class="photo-settings" aria-labelledby="photo-settings-title">
            <div class="photo-preview-frame">
              <img id="resume-photo-preview" alt="证件照预览" hidden>
              <span id="resume-photo-empty">未上传</span>
            </div>
            <div class="photo-settings-copy">
              <strong id="photo-settings-title">证件照（可选）</strong>
              <small>照片仅在本机裁剪和导出，不会发送给 AI 服务商。</small>
              <div class="photo-actions">
                <label class="secondary-button photo-file-button">
                  <input id="resume-photo-file" type="file" accept="image/jpeg,image/png,image/webp,.jpg,.jpeg,.png,.webp">
                  <span id="resume-photo-upload-text">上传证件照</span>
                </label>
                <button id="delete-resume-photo" class="text-danger-button" type="button" hidden>删除照片</button>
              </div>
              <label class="photo-visible-option" for="show-resume-photo">
                <input id="show-resume-photo" type="checkbox" disabled>
                <span>在导出的简历中显示证件照</span>
              </label>
            </div>
          </section>
        </div>
        <div id="resume-fields" class="resume-editor"></div>
      </section>

      <div id="empty" class="empty" hidden>没有找到这次分析记录，请返回插件重新分析。</div>
    </main>
    <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
    <script src="../../features/job-capture/salary-parser.js"></script>
    <script type="module" src="controller.mjs"></script>
  </body>
</html>
