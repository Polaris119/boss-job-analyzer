<!doctype html>
<html lang="zh-CN">
  <head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>结果页预览</title><link rel="stylesheet" href="../src/entries/results/styles.css"></head>
  <body>
    <header class="result-header"><div><h1 id="job-title">岗位分析结果</h1><span id="job-meta"></span></div><a class="back-workbench-button" href="../src/entries/workbench/index.html">← 返回岗位工作台</a></header>
    <main class="result-shell">
      <nav class="top-tabs"><button class="top-tab active" data-tab="report">岗位准备分析</button><button class="top-tab" data-tab="resume">定制简历</button></nav>
      <section id="report-panel" class="panel">
        <div class="panel-toolbar"><h2>岗位准备分析</h2><button id="download-markdown" class="primary-button">下载 Markdown 报告</button></div>
        <div class="report-layout">
          <aside class="report-sidebar"><p>求职判断</p><nav id="report-nav" class="report-nav"><a href="#overview-section" data-target="overview-section" aria-current="true">是否适合投</a><a href="#strengths-section" data-target="strengths-section">我有什么优势</a><a href="#gaps-section" data-target="gaps-section">还需要补什么</a><a href="#actions-section" data-target="actions-section">现在该做什么</a><a href="#knowledge-section" data-target="knowledge-section">需要学什么</a><a href="#short-term-section" data-target="short-term-section">近期准备</a><a href="#long-term-section" data-target="long-term-section">长期提升</a><a href="#interview-section" data-target="interview-section">面试准备</a></nav></aside>
          <div class="report-content"><section id="overview-section" class="content-card overview-card" data-report-section></section><section id="strengths-section" class="content-card" data-report-section></section><section id="gaps-section" class="content-card" data-report-section></section><section id="actions-section" class="content-card" data-report-section></section><section id="knowledge-section" class="content-card" data-report-section></section><section id="short-term-section" class="content-card" data-report-section></section><section id="long-term-section" class="content-card" data-report-section></section><section id="interview-section" class="content-card" data-report-section></section></div>
        </div>
      </section>
      <section id="resume-panel" class="panel" hidden>
        <div class="panel-toolbar"><div><h2>定制简历</h2><p>经典蓝色单栏 · A4 自动分页</p></div><div class="toolbar-actions"><label class="theme-control">分隔线颜色 <input id="resume-theme-color" type="color" value="#24548f"></label><button id="add-resume-section" class="secondary-button">新增区块</button><button id="save-result" class="secondary-button">保存修改</button><button id="export-pdf" class="primary-button">预览并导出 PDF</button></div></div>
        <div class="resume-template-settings"><div class="template-summary"><span class="template-swatch"></span><span><strong>经典蓝色单栏</strong><small>经历分列展示，奖项按内容与时间对齐；内容过长时自动分页。</small></span></div><section class="photo-settings"><div class="photo-preview-frame"><img id="resume-photo-preview" alt="证件照预览" hidden><span id="resume-photo-empty">未上传</span></div><div class="photo-settings-copy"><strong>证件照（可选）</strong><small>照片仅在本机裁剪和导出，不会发送给 AI 服务商。</small><div class="photo-actions"><label class="secondary-button photo-file-button"><input id="resume-photo-file" type="file" accept="image/jpeg,image/png,image/webp"><span id="resume-photo-upload-text">上传证件照</span></label><button id="delete-resume-photo" class="text-danger-button" hidden>删除照片</button></div><label class="photo-visible-option"><input id="show-resume-photo" type="checkbox" disabled><span>在导出的简历中显示证件照</span></label></div></section></div>
        <div id="resume-fields" class="resume-editor"></div>
      </section>
      <div id="empty" class="empty" hidden></div>
    </main><div id="toast" class="toast" hidden></div>
    <script>
      const demo = {
        id:"demo", job:{title:"AI Agent 工程师",company:"示例科技",salary:"15-25K",url:"https://example.com"}, createdAt:new Date().toISOString(), resumeThemeColor:"#24548f",
        roleProfile:{primaryFamily:"data_ai",specialty:"AI Agent 应用工程",seniority:"senior",hiringIntent:"把 Agent 与 RAG 能力稳定地落地到真实业务",confidence:"high"},
        analysis:{
          readiness:{level:"near_ready",oneLiner:"核心技术方向匹配，当前最需要补足的是评测与线上效果证据。",rationale:"已有 RAG 工程实践，但简历尚未体现评测方法和稳定性结果。",confidence:"high"},
          strengths:[{id:"S1",title:"具备完整的 RAG 工程实践",jobNeed:"能够落地企业知识库和检索增强应用",resumeEvidence:["负责企业知识库问答的切分、检索和引用链路"],impact:"已经覆盖岗位最核心的工程场景"}],
          gaps:[{id:"G1",type:"evidence",title:"缺少可验证的评测与稳定性结果",jobNeed:"建立 Agent 与 RAG 效果评估体系",jdEvidence:"负责 Agent 评测和线上效果优化",resumeEvidence:["简历只描述了实现链路"],impact:"面试官无法判断方案质量和优化深度",action:"为现有项目补充评测集、指标和前后对比结果"}],
          nextActions:[{id:"A1",title:"补充项目评测证据",detail:"在知识库项目中加入评测集规模、核心指标和一次优化前后对比。",timing:"before_application",relatedGapIds:["G1"]}],
          knowledgePoints:[{id:"K1",topic:"RAG 离线评测",mode:"practice",reason:"需要把实现经历转化为效果证据",currentState:"已有完整实现，但没有评测描述",targetDepth:"能够设计评测集、选择指标并解释优化结果",relatedGapIds:["G1"]}]
        },
        preparation:{
          shortTermRoadmap:[{id:"P1",title:"建立最小可用评测集",relatedKnowledgePointIds:["K1"],duration:"1 周",objective:"为现有项目形成可验证的效果证据",concepts:["召回率","答案忠实度","回归测试"],practice:"整理 20 条业务问题并执行一次参数对比实验",deliverable:"包含问题、指标、结果和结论的评测记录",completionCriteria:"能够复现测试并解释指标变化"}],
          longTermRoadmap:[{id:"L1",title:"积累线上评测与监控经验",relatedKnowledgePointIds:["K1"],duration:"持续积累",objective:"形成生产环境的质量保障能力",concepts:["在线反馈","质量监控"],practice:"在真实项目中跟踪失败案例并持续扩充评测集",deliverable:"版本化评测集与回归机制",completionCriteria:"每次变更都能发现质量退化"}],
          interview:{eligible:true,reason:"当前已达到基本投递要求",questions:[{id:"Q1",type:"evidence",question:"你如何证明知识库问答项目的检索效果是可靠的？",why:"岗位明确关注 Agent 评测与稳定性",assesses:"评测设计、指标理解和问题定位能力",resumeAnchor:"企业知识库问答项目",answerOutline:["说明评测目标","介绍测试集来源","解释指标和优化结果"],followUps:["如果没有标准答案如何评估？","线上效果下降如何定位？"]}]}
        },
        optimizedResume:{fullName:"张三",politicalStatus:"中共党员",email:"example@example.com",birthDate:"2000.05",phone:"138-0000-0000",summary:"后端工程师，具备 AI 应用、知识库和工作流项目经验。",sections:[{title:"项目经历",kind:"standard",entries:[{date:"2024.03—2025.06",organization:"企业知识库问答平台",position:"核心开发",bullets:[{label:"技术架构",text:"完成文档切分、向量检索和答案引用链路。"},{label:"项目成果",text:"建立离线评测集并持续优化召回效果。"}]}]},{title:"教育背景",kind:"standard",entries:[{date:"2018.09—2022.06",organization:"示例大学",position:"计算机科学与技术 本科",bullets:[]}]},{title:"荣誉奖项",kind:"awards",entries:[{date:"2024.07",organization:"全国大学生智能应用创新竞赛一等奖",position:"",bullets:[]},{date:"2023.09",organization:"校一等奖学金、优秀研究生",position:"",bullets:[]}]}],pendingConfirmations:[]},
        resumePresentation:null
      };
      const parameters = new URLSearchParams(location.search);
      if (parameters.get("resume") === "0") { demo.generateResume=false; demo.optimizedResume=null; }
      if (parameters.get("legacy") === "1") demo.optimizedResume={sections:[{title:"旧版简历",items:["旧版内容"]}]};
      if (parameters.get("photo") === "1") demo.resumePresentation={templateId:"classic-blue",showPhoto:true,photo:{fileName:"preview.png",updatedAt:new Date().toISOString(),dataUrl:"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNk+A8AAQUBAScY42YAAAAASUVORK5CYII="}};
      if (parameters.get("fit") === "ready") {
        demo.analysis.readiness = { level:"ready", oneLiner:"当前简历已覆盖岗位核心要求，可以直接投递。", rationale:"现有项目与岗位方向一致，没有发现需要临时补齐的关键能力。", confidence:"high" };
        demo.analysis.gaps = [];
        demo.analysis.nextActions = [];
        demo.analysis.knowledgePoints = [];
        demo.preparation.shortTermRoadmap = [];
        demo.preparation.longTermRoadmap = [];
      }
      if (parameters.get("fit") === "stretch") {
        demo.roleProfile.specialty = "招聘专员";
        demo.roleProfile.seniority = "junior";
        demo.roleProfile.hiringIntent = "批量完成销售岗位招聘，并对招聘交付结果负责。";
        demo.analysis.readiness = { level:"stretch", oneLiner:"核心经历方向不匹配，是当前投递的主要风险。", rationale:"你已满足基础门槛，但简历暂时无法证明招聘交付或销售成果。", confidence:"high" };
      }
      window.__RESULTS_PREVIEW_RECORD__=demo;
      window.chrome={storage:{local:{get:async()=>({}),set:async()=>{}}},tabs:{create:async()=>{}},runtime:{getURL:(value)=>value}};
    </script>
    <script src="../src/features/job-capture/salary-parser.js"></script><script type="module" src="../src/entries/results/controller.mjs"></script>
  </body>
</html>
