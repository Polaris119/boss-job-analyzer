<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PDF 预览测试</title>
    <link rel="stylesheet" href="../src/entries/resume-print/styles.css">
  </head>
  <body>
    <aside class="toolbar">
      <div><strong>PDF 导出预览</strong><span>按 A4 纸张分页预览</span></div>
      <button id="print" type="button">打印 / 保存 PDF</button>
    </aside>
    <main id="resume" class="resume-pages"></main>
    <script>
      window.chrome = {
        storage: {
          local: {
            get: async () => ({
              printResume: {
                job: { company: "示例科技", title: "AI Agent 工程师" },
                themeColor: "#24548f",
                resume: {
                  fullName: "张三",
                  politicalStatus: "中共党员",
                  email: "example@example.com",
                  birthDate: "2000.05",
                  phone: "138-0000-0000（微信同号）",
                  summary: "后端工程师，具备 AI 应用、知识库和工作流项目经验。",
                  sections: [
                    { title: "教育背景", entries: [{ date: "2018.09—2022.06", organization: "示例大学", position: "计算机科学与技术 本科", bullets: [{ label: "核心课程", text: "数据结构、操作系统、计算机网络与数据库原理。" }] }] },
                    { title: "工作经历", entries: [{ date: "2022.07—至今", organization: "示例科技", position: "后端工程师", bullets: [{ label: "业务平台", text: "负责接口设计、服务治理与上线维护。" }, { label: "AI 应用", text: "完成知识库检索、工具调用和工作流能力建设。" }] }] },
                    { title: "项目经历", entries: [{ date: "2024.03—2025.06", organization: "企业知识库问答平台", position: "核心开发", bullets: [{ label: "技术架构", text: "完成文档切分、向量检索和答案引用链路。" }, { label: "项目成果", text: "支持内部资料检索并建立离线评测流程。" }] }] },
                    { title: "荣誉奖项", kind: "awards", entries: [{ date: "2024.07", organization: "全国大学生智能应用创新竞赛一等奖", position: "", bullets: [] }, { date: "2023.09", organization: "校一等奖学金、优秀研究生", position: "", bullets: [] }] },
                    { title: "专业技能", entries: [{ date: "", organization: "", position: "", bullets: [{ label: "开发语言", text: "Python、TypeScript" }, { label: "数据与中间件", text: "MySQL、Redis" }, { label: "AI 应用", text: "大模型 API、RAG、工具调用" }] }] },
                    ...(location.search.includes("long=1") ? [{ title: "补充项目", entries: Array.from({ length: 12 }, (_, index) => ({ date: `202${index % 5}.01—202${index % 5}.06`, organization: `业务系统优化项目 ${index + 1}`, position: "核心开发", bullets: [{ label: "项目工作", text: "完成需求分析、方案设计、功能实现和上线验证，并记录关键指标与优化结果。" }, { label: "项目成果", text: "沉淀可复用的工程实践和质量检查流程。" }] })) }] : [])
                  ]
                },
                presentation: location.search.includes("photo=1") ? {templateId:"classic-blue",showPhoto:true,photo:{fileName:"preview.png",dataUrl:"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNk+A8AAQUBAScY42YAAAAASUVORK5CYII="}} : {templateId:"classic-blue",showPhoto:false,photo:null}
              }
            })
          }
        }
      };
    </script>
    <script type="module" src="../src/entries/resume-print/controller.mjs"></script>
  </body>
</html>
